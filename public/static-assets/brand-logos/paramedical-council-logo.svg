<svg xmlns="http://www.w3.org/2000/svg" width="280" height="300" viewBox="0 0 280 300" role="img">
<title>Paramedical Council — Logo</title>
<desc>Paramedical Council regulatory body logo with hexagonal emblem and medical cross</desc>

<!-- Hexagon emblem -->
<polygon points="140,18 228,65 228,185 140,232 52,185 52,65" fill="#F0EBE0" stroke="#1A3A6B" stroke-width="3"/>
<polygon points="140,30 218,73 218,177 140,220 62,177 62,73" fill="none" stroke="#C9A227" stroke-width="1.3"/>

<!-- Inner hex ring detail -->
<polygon points="140,46 206,83 206,167 140,204 74,167 74,83" fill="none" stroke="#1A3A6B" stroke-width="0.7" opacity="0.3"/>

<!-- Medical cross large -->
<rect x="122" y="78" width="36" height="94" rx="6" fill="#1A3A6B"/>
<rect x="96"  y="104" width="88" height="36" rx="6" fill="#1A3A6B"/>

<!-- Cross inner highlight lines -->
<rect x="126" y="82"  width="8"  height="22" rx="3" fill="#C9A227" opacity="0.45"/>
<rect x="100" y="108" width="18" height="8"  rx="3" fill="#C9A227" opacity="0.45"/>

<!-- Stethoscope arc on top of cross -->
<path d="M 122,90 Q 100,78 96,105" fill="none" stroke="#C9A227" stroke-width="2.2" stroke-linecap="round"/>
<circle cx="95" cy="107" r="5" fill="none" stroke="#C9A227" stroke-width="2"/>
<circle cx="95" cy="107" r="2" fill="#C9A227"/>

<!-- Corner star ornaments on hex -->
<circle cx="140" cy="22" r="4" fill="#C9A227"/>
<circle cx="224" cy="67" r="3.5" fill="#C9A227"/>
<circle cx="224" cy="183" r="3.5" fill="#C9A227"/>
<circle cx="140" cy="228" r="4" fill="#C9A227"/>
<circle cx="56"  cy="183" r="3.5" fill="#C9A227"/>
<circle cx="56"  cy="67"  r="3.5" fill="#C9A227"/>

<!-- Bottom text band inside hex -->
<rect x="60" y="182" width="160" height="32" rx="3" fill="#1A3A6B"/>
<text x="140" y="194" font-family="Georgia,serif" font-size="9" font-weight="700" fill="#FFFFFF" text-anchor="middle" letter-spacing="1.5">PARAMEDICAL</text>
<text x="140" y="208" font-family="Georgia,serif" font-size="9" font-weight="700" fill="#C9A227" text-anchor="middle" letter-spacing="1.5">COUNCIL</text>

<!-- Outer label below hex -->
<text x="140" y="258" font-family="Georgia,serif" font-size="10.5" font-weight="700" fill="#1A3A6B" text-anchor="middle" letter-spacing="1">ALLIED HEALTH</text>
<text x="140" y="273" font-family="Georgia,serif" font-size="9" fill="#555555" text-anchor="middle" letter-spacing="2">REGULATORY BODY</text>

<!-- Gold base line -->
<line x1="60" y1="280" x2="220" y2="280" stroke="#C9A227" stroke-width="1.5"/>
<text x="140" y="295" font-family="Georgia,serif" font-size="9" fill="#8B6914" text-anchor="middle" letter-spacing="2">INDIA</text>
</svg>

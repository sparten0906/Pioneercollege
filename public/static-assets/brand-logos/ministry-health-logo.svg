<svg xmlns="http://www.w3.org/2000/svg" width="280" height="300" viewBox="0 0 280 300" role="img">
<title>Ministry of Health and Family Welfare — Logo</title>
<desc>Government ministry of health logo with Ashoka Chakra and caduceus symbol</desc>

<!-- Outer shield shape -->
<path d="M 140,20 L 240,60 L 240,190 Q 240,260 140,290 Q 40,260 40,190 L 40,60 Z" fill="#FFFDF7" stroke="#1A3A6B" stroke-width="2.5"/>
<path d="M 140,32 L 228,68 L 228,188 Q 228,250 140,278 Q 52,250 52,188 L 52,68 Z" fill="none" stroke="#C9A227" stroke-width="1.2"/>

<!-- Ashoka Chakra (simplified) -->
<circle cx="140" cy="120" r="38" fill="none" stroke="#1A3A6B" stroke-width="2"/>
<circle cx="140" cy="120" r="6" fill="#1A3A6B"/>
<!-- 24 spokes -->
<line x1="140" y1="82" x2="140" y2="88" stroke="#1A3A6B" stroke-width="1.5"/>
<line x1="140" y1="152" x2="140" y2="158" stroke="#1A3A6B" stroke-width="1.5"/>
<line x1="102" y1="120" x2="108" y2="120" stroke="#1A3A6B" stroke-width="1.5"/>
<line x1="172" y1="120" x2="178" y2="120" stroke="#1A3A6B" stroke-width="1.5"/>
<line x1="113" y1="93" x2="117" y2="99" stroke="#1A3A6B" stroke-width="1.3"/>
<line x1="163" y1="141" x2="167" y2="147" stroke="#1A3A6B" stroke-width="1.3"/>
<line x1="167" y1="93" x2="163" y2="99" stroke="#1A3A6B" stroke-width="1.3"/>
<line x1="113" y1="141" x2="117" y2="147" stroke="#1A3A6B" stroke-width="1.3"/>
<line x1="102" y1="107" x2="107" y2="110" stroke="#1A3A6B" stroke-width="1.2"/>
<line x1="173" y1="130" x2="178" y2="133" stroke="#1A3A6B" stroke-width="1.2"/>
<line x1="102" y1="133" x2="107" y2="130" stroke="#1A3A6B" stroke-width="1.2"/>
<line x1="173" y1="110" x2="178" y2="107" stroke="#1A3A6B" stroke-width="1.2"/>
<line x1="120" y1="84" x2="122" y2="90" stroke="#1A3A6B" stroke-width="1.2"/>
<line x1="158" y1="150" x2="160" y2="156" stroke="#1A3A6B" stroke-width="1.2"/>
<line x1="158" y1="84" x2="156" y2="90" stroke="#1A3A6B" stroke-width="1.2"/>
<line x1="120" y1="150" x2="122" y2="156" stroke="#1A3A6B" stroke-width="1.2"/>

<!-- Caduceus staff inside chakra -->
<line x1="140" y1="98" x2="140" y2="142" stroke="#C9A227" stroke-width="2.5"/>
<!-- Wings -->
<path d="M 140,103 Q 125,96 118,100" fill="none" stroke="#C9A227" stroke-width="1.8"/>
<path d="M 140,103 Q 155,96 162,100" fill="none" stroke="#C9A227" stroke-width="1.8"/>
<!-- Serpent curves -->
<path d="M 136,108 Q 130,114 136,120 Q 142,126 136,132" fill="none" stroke="#C9A227" stroke-width="1.5"/>
<path d="M 144,108 Q 150,114 144,120 Q 138,126 144,132" fill="none" stroke="#C9A227" stroke-width="1.5"/>
<!-- Top orb -->
<circle cx="140" cy="100" r="4" fill="#C9A227"/>

<!-- Text below -->
<text x="140" y="178" font-family="Georgia,serif" font-size="11" font-weight="700" fill="#1A3A6B" text-anchor="middle" letter-spacing="1">MINISTRY OF HEALTH</text>
<text x="140" y="192" font-family="Georgia,serif" font-size="10" font-weight="600" fill="#1A3A6B" text-anchor="middle" letter-spacing="0.5">&amp; FAMILY WELFARE</text>

<!-- Gold divider -->
<line x1="80" y1="200" x2="200" y2="200" stroke="#C9A227" stroke-width="1.2"/>

<text x="140" y="218" font-family="Georgia,serif" font-size="9.5" fill="#555555" text-anchor="middle" letter-spacing="2">GOVERNMENT OF INDIA</text>

<!-- Bottom motto -->
<text x="140" y="260" font-family="Georgia,serif" font-size="10" fill="#8B6914" text-anchor="middle" letter-spacing="1.5" font-style="italic">Swastha Bharat · Samridh Bharat</text>
</svg>

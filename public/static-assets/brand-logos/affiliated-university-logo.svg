<svg xmlns="http://www.w3.org/2000/svg" width="280" height="300" viewBox="0 0 280 300" role="img">
<title>Affiliated University — Logo</title>
<desc>University affiliation logo with academic torch and laurel wreath design</desc>
<defs>
  <style>
    .un  { font-family: Georgia,'Times New Roman',serif; font-size:12px; font-weight:700; fill:#1A3A6B; letter-spacing:1px; }
    .us  { font-family: Georgia,'Times New Roman',serif; font-size:9.5px; fill:#8B6914; letter-spacing:2px; font-weight:600; }
  </style>
</defs>

<!-- Outer ring -->
<circle cx="140" cy="145" r="128" fill="none" stroke="#1A3A6B" stroke-width="3"/>
<circle cx="140" cy="145" r="118" fill="none" stroke="#C9A227" stroke-width="1.2"/>
<circle cx="140" cy="145" r="117" fill="#F4EFE5"/>

<!-- Top arc -->
<path id="ua" d="M 28,110 A 118,118 0 0,1 252,110" fill="none"/>
<text font-family="Georgia,serif" font-size="11" font-weight="700" fill="#1A3A6B" letter-spacing="2">
  <textPath href="#ua" startOffset="50%" text-anchor="middle">AFFILIATED UNIVERSITY</textPath>
</text>

<!-- Bottom arc -->
<path id="ub" d="M 32,188 A 118,118 0 0,0 248,188" fill="none"/>
<text font-family="Georgia,serif" font-size="10" font-weight="600" fill="#8B6914" letter-spacing="2">
  <textPath href="#ub" startOffset="50%" text-anchor="middle">KNOWLEDGE  ·  SERVICE  ·  INTEGRITY</textPath>
</text>

<!-- Torch flame -->
<ellipse cx="140" cy="88" rx="10" ry="14" fill="#E8740A"/>
<ellipse cx="140" cy="92" rx="6" ry="9" fill="#F5A623"/>
<ellipse cx="140" cy="95" rx="3" ry="5" fill="#FECB56"/>
<!-- Torch body -->
<rect x="135" y="100" width="10" height="28" rx="3" fill="#1A3A6B"/>
<rect x="131" y="126" width="18" height="5" rx="2" fill="#C9A227"/>
<rect x="133" y="131" width="14" height="3" rx="1.5" fill="#1A3A6B"/>

<!-- Left laurel branch -->
<ellipse cx="110" cy="148" rx="8" ry="5" fill="#2D6A2D" opacity="0.85" transform="rotate(-30 110 148)"/>
<ellipse cx="100" cy="158" rx="8" ry="5" fill="#2D6A2D" opacity="0.85" transform="rotate(-45 100 158)"/>
<ellipse cx="94"  cy="170" rx="8" ry="5" fill="#2D6A2D" opacity="0.85" transform="rotate(-60 94 170)"/>
<ellipse cx="93"  cy="183" rx="8" ry="5" fill="#2D6A2D" opacity="0.8"  transform="rotate(-70 93 183)"/>
<path d="M 118,140 Q 96,163 95,188" fill="none" stroke="#5A8A3A" stroke-width="1.5"/>

<!-- Right laurel branch -->
<ellipse cx="170" cy="148" rx="8" ry="5" fill="#2D6A2D" opacity="0.85" transform="rotate(30 170 148)"/>
<ellipse cx="180" cy="158" rx="8" ry="5" fill="#2D6A2D" opacity="0.85" transform="rotate(45 180 158)"/>
<ellipse cx="186" cy="170" rx="8" ry="5" fill="#2D6A2D" opacity="0.85" transform="rotate(60 186 170)"/>
<ellipse cx="187" cy="183" rx="8" ry="5" fill="#2D6A2D" opacity="0.8"  transform="rotate(70 187 183)"/>
<path d="M 162,140 Q 184,163 185,188" fill="none" stroke="#5A8A3A" stroke-width="1.5"/>

<!-- Gold ribbon at bottom joining branches -->
<path d="M 95,190 Q 140,205 185,190" fill="none" stroke="#C9A227" stroke-width="2.5"/>

<!-- University year -->
<text x="140" y="168" font-family="Georgia,serif" font-size="13" font-weight="700" fill="#1A3A6B" text-anchor="middle">UNIV.</text>
<text x="140" y="185" font-family="Georgia,serif" font-size="10" fill="#8B6914" text-anchor="middle" letter-spacing="2">EST. 1980</text>

<!-- Separator dots -->
<circle cx="87" cy="145" r="2.5" fill="#C9A227"/>
<circle cx="193" cy="145" r="2.5" fill="#C9A227"/>

<!-- Name below emblem -->
<text x="140" y="292" class="us" text-anchor="middle">AFFILIATED UNIVERSITY SEAL</text>
</svg>
